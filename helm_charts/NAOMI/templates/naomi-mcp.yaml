{{- if .Values.naomiMcp.enabled }}
---
# ServiceAccount
apiVersion: v1
kind: ServiceAccount
metadata:
  name: naomi-mcp
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: naomi-mcp
    app.kubernetes.io/part-of: naomi

---
# ClusterRole — full cluster-admin-like permissions
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: naomi-mcp
  labels:
    app.kubernetes.io/name: naomi-mcp
rules:
  # Full access to core resources (pods, services, namespaces, secrets, …)
  - apiGroups: [""]
    resources:
      - pods
      - pods/log
      - pods/exec
      - services
      - endpoints
      - namespaces
      - nodes
      - configmaps
      - secrets
      - events
      - persistentvolumeclaims
      - persistentvolumes
      - serviceaccounts
      - replicationcontrollers
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # Deployments, ReplicaSets, StatefulSets, DaemonSets
  - apiGroups: ["apps"]
    resources:
      - deployments
      - replicasets
      - statefulsets
      - daemonsets
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # Jobs, CronJobs
  - apiGroups: ["batch"]
    resources:
      - jobs
      - cronjobs
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # RBAC
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources:
      - roles
      - rolebindings
      - clusterroles
      - clusterrolebindings
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # Flyte CRDs
  - apiGroups: ["flyte.lyft.com", "flytekit.flyte.org", "flyte.org"]
    resources: ["*"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # Ray CRDs (kuberay)
  - apiGroups: ["ray.io"]
    resources: ["*"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # Ingresses & network policies
  - apiGroups: ["networking.k8s.io"]
    resources:
      - ingresses
      - networkpolicies
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # Storage
  - apiGroups: ["storage.k8s.io"]
    resources:
      - storageclasses
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # Autoscaling
  - apiGroups: ["autoscaling"]
    resources:
      - horizontalpodautoscalers
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # Custom Resource Definitions
  - apiGroups: ["apiextensions.k8s.io"]
    resources:
      - customresourcedefinitions
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # Metrics
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods", "nodes"]
    verbs: ["get", "list"]

---
# ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: naomi-mcp
  labels:
    app.kubernetes.io/name: naomi-mcp
subjects:
  - kind: ServiceAccount
    name: naomi-mcp
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: naomi-mcp
  apiGroup: rbac.authorization.k8s.io

---
# Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: naomi-mcp
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: naomi-mcp
    app.kubernetes.io/part-of: naomi
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: naomi-mcp
  template:
    metadata:
      labels:
        app.kubernetes.io/name: naomi-mcp
        app.kubernetes.io/part-of: naomi
    spec:
      serviceAccountName: naomi-mcp
      automountServiceAccountToken: true  # explicit — required on some distros (microk8s, etc.)
      containers:
        - name: naomi-mcp
          image: {{ .Values.naomiMcp.image }}
          imagePullPolicy: {{ .Values.naomiMcp.imagePullPolicy | default "IfNotPresent" }}
          ports:
            - containerPort: 8000
              name: http
              protocol: TCP
          env:
            # ---- MCP transport ----
            - name: MCP_TRANSPORT
              value: "streamable-http"
            - name: MCP_HOST
              value: "0.0.0.0"
            - name: MCP_PORT
              value: "8000"
            - name: MCP_PATH
              value: "/mcp"

            # ---- Helm / Namespace (used to build in-cluster DNS defaults) ----
            - name: HELM_RELEASE_NAME
              value: {{ .Release.Name | quote }}
            - name: NAOMI_NAMESPACE
              value: {{ .Release.Namespace | quote }}

            # ---- MinIO credentials ----
            - name: MINIO_ACCESS_KEY
              value: {{ .Values.minio.auth.rootUser | quote }}
            - name: MINIO_SECRET_KEY
              value: {{ .Values.minio.auth.rootPassword | quote }}

          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi

---
# Service - ClusterIP — reachable within the cluster
apiVersion: v1
kind: Service
metadata:
  name: naomi-mcp
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: naomi-mcp
    app.kubernetes.io/part-of: naomi
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: naomi-mcp
  ports:
    - name: http
      port: 8000
      targetPort: http
      protocol: TCP

---
# Service - NodePort — reachable from outside via <node_ip>:{{ .Values.naomiMcp.nodePort }}
apiVersion: v1
kind: Service
metadata:
  name: naomi-mcp-nodeport
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: naomi-mcp
    app.kubernetes.io/part-of: naomi
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: naomi-mcp
  ports:
    - name: http
      port: 8000
      targetPort: http
      nodePort: {{ .Values.naomiMcp.nodePort }}
      protocol: TCP
{{- end }}
